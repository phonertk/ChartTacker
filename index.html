<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chart Tracker</title>

<style>
body{font-family:sans-serif;background:#0f1923;color:#fff;padding:20px}
table{width:100%;border-collapse:collapse;margin-top:20px}
td,th{border-bottom:1px solid #333;padding:10px}
button{padding:6px 12px;border:none;border-radius:6px;cursor:pointer}
.delete{background:#ef444422;color:#ef4444}

/* modal */
.modal{
  position:fixed;inset:0;background:rgba(0,0,0,0.7);
  display:none;align-items:center;justify-content:center;
}
.modal.show{display:flex}
.box{
  background:#16202c;padding:20px;border-radius:10px;width:300px
}
</style>
</head>

<body>

<h2>📋 Chart</h2>

<input id="hn" placeholder="HN">
<input id="name" placeholder="ชื่อ">
<button onclick="add()">เพิ่ม</button>

<table>
<thead>
<tr><th>HN</th><th>ชื่อ</th><th>จัดการ</th></tr>
</thead>
<tbody id="list"></tbody>
</table>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="box">
    <h3 style="color:#ef4444">🗑 ลบข้อมูล</h3>
    <div id="info"></div>
    <p style="color:#999">ลบแล้วกู้คืนไม่ได้</p>
    <button onclick="closeModal()">ยกเลิก</button>
    <button onclick="confirmDelete()" style="background:#ef4444;color:#fff">ลบ</button>
  </div>
</div>

<script>
let charts = JSON.parse(localStorage.getItem('charts')||'[]');
let delId=null;

function save(){localStorage.setItem('charts',JSON.stringify(charts));}

function render(){
  const el=document.getElementById('list');
  el.innerHTML=charts.map(c=>`
    <tr>
      <td>${c.hn}</td>
      <td>${c.name}</td>
      <td>
        <button class="delete" onclick="openDelete('${c.id}')">🗑 ลบ</button>
      </td>
    </tr>
  `).join('');
}

function add(){
  const hn=document.getElementById('hn').value;
  const name=document.getElementById('name').value;
  if(!hn||!name)return alert('กรอกก่อน');
  charts.push({id:Date.now(),hn,name});
  save(); render();
}

/* DELETE */
function openDelete(id){
  delId=id;
  const c=charts.find(x=>x.id==id);
  document.getElementById('info').innerHTML=`<b>${c.hn}</b> - ${c.name}`;
  document.getElementById('modal').classList.add('show');
}
function closeModal(){
  document.getElementById('modal').classList.remove('show');
}
function confirmDelete(){
  charts=charts.filter(x=>x.id!=delId);
  save(); render(); closeModal();
}

render();
</script>

</body>
</html>
